ration of the object is directly proportional to the net force on it and inversely proportional to its mass.", "The rate at which the speed of the parachutist increases becomes smaller as her speed grows, and reaches zero at terminal velocity.", "The kinetic energy lost by the trolley is equal to the work done against friction over the distance it travels."], "bIntro": "7b — Turn these equations into physical descriptions. For each: describe a situation it applies to, say what each symbol means physically (not just its name), and then answer the question asked.", "b": ["v² = u² + 2as — If a doubles while everything else stays the same, what happens to v, and why physically?", "F = mv²/r — If r is halved at constant speed, what happens to the force needed, and where does that force actually come from in a real example?", "mgh = ½mv² — Why does the mass disappear from this equation, and what is it telling you about the world?"], "cIntro": ["7c — Sketches. On paper, sketch the shape of these graphs. No numbers, no scale. Mark any intercepts, asymptotes or turning points. Photograph and send with your results."], "c": ["Velocity against time for a ball thrown straight up and caught again at the same height", "Kinetic energy against time for that same ball", "Acceleration against time for a parachutist from jumping to terminal velocity"]}, "p8": {"title": "Part 8 — Find the mistake", "intro": ["Each of these four solutions contains exactly one error. Say which line it’s on and what’s wrong with it.", "You don’t need to work out the correct answer."], "items": [{"stem": "A ball on a string is swung in a vertical circle. Find the minimum speed at the top for the string to stay taut.", "lines": ["At the top, the forces on the ball are the tension T downward and the weight mg downward.", "So T + mg = mv²/r", "The minimum speed is when the ball is only just moving, so v = 0.", "Therefore T = −mg, and the minimum speed is zero."]}, {"stem": "A ball is thrown vertically upward at 20 m s⁻¹. Find the time until it returns to the thrower’s hand. Take g = 9.8 m s⁻².", "lines": ["Taking upward as positive, u = +20 m s⁻¹, a = +9.8 m s⁻²", "At the end, displacement s = 0", "s = ut + ½at² → 0 = 20t + 4.9t²", "t(20 + 4.9t) = 0, so t = −4.08 s", "Ignoring the minus sign, t = 4.08 s"]}, {"stem": "A motor does 450 J of work in 3.0 minutes. Find its average power output.", "lines": ["Power is work done per unit time.", "P = W / t", "P = 450 / 3.0", "P = 150 W"]}, {"stem": "A car of mass 1200 kg travelling at 20 m s⁻¹ brakes with a constant friction force of 6000 N. Find the braking distance.", "lines": ["Work done by friction = loss in kinetic energy", "Fd = ½mv²", "6000 × d = 0.5 × 1200 × 20", "d = 12000 / 6000 = 2.0 m", "The braking distance is 2.0 m."]}]}, "p9": {"title": "Part 9 — What do you think happens?", "intro": ["For each: choose what happens, then choose the reason that best matches your thinking, then say how sure you are.", "Choose the reason that’s actually yours, not the one that sounds most like a textbook.", "You won’t be able to come back to a question once you’ve moved on."], "items": [{"q": "A box is being pushed across a rough floor at a constant velocity. What is the net force on the box?", "a": ["Zero", "Forward, in the direction of motion", "Backward", "Depends on the speed"], "r": ["Constant velocity means no acceleration, so forces balance", "Something must keep pushing it or it would stop, so there’s a net forward force", "Friction always wins eventually so the net force is backward", "Faster motion needs more force so it depends on speed"]}, {"q": "A truck collides head-on with a small car. Which experiences the greater force?", "a": ["The truck", "The car", "Equal on both", "Depends which was moving faster"], "r": ["The truck is heavier so it pushes harder", "Forces in an interaction are always equal and opposite", "The car is damaged more, so it must have had more force on it", "The faster one exerts more force"]}, {"q": "A ball is thrown vertically upward. At the very highest point of its flight, what is its acceleration?", "a": ["Zero", "9.8 m s⁻² downward", "9.8 m s⁻² upward", "Momentarily undefined"], "r": ["The velocity is zero there, so the acceleration must be zero too", "Gravity acts the whole time regardless of the velocity", "It’s about to come back down so acceleration points up", "It’s changing direction so acceleration is undefined at that instant"]}, {"q": "Two balls, one 1 kg and one 5 kg, are released from the same height. Air resistance is negligible. Which lands first?", "a": ["The 1 kg", "The 5 kg", "Same time", "Depends on their size"], "r": ["Heavier objects are pulled harder by gravity so fall faster", "Greater weight is exactly cancelled by greater inertia, so acceleration is the same", "Lighter objects meet less resistance", "Gravity acts equally on everything regardless of anything else"]}, {"q": "A car goes round a circular bend at constant speed. What is the direction of the net force on it?", "a": ["Forward, along the direction of travel", "Toward the centre of the circle", "Away from the centre", "Zero, since the speed is constant"], "r": ["The velocity is changing direction, and that change points inward", "There’s a centrifugal force pushing the car outward", "The car is moving forward so the force is forward", "Constant speed means no acceleration and so no net force"]}, {"q": "A ball is being swung in a horizontal circle on a string. The string suddenly snaps. Which path does the ball take, viewed from above?", "a": ["Continues curving along the same circle", "Flies straight out along the radius, directly away from the centre", "Travels in a straight line along the tangent", "Spirals outward"], "r": ["With no net force it keeps the velocity it had, which was tangential", "The outward force is released and throws it outward along the radius", "It keeps some of the circular motion for a while", "The stored circular motion makes it spiral"]}, {"q": "A block rests on a ramp inclined at 30°. How does the normal force compare with the block’s weight?", "a": ["Equal to the weight", "Less than the weight", "Greater than the weight", "Zero"], "r": ["The normal force always equals the weight", "The normal force balances only the component of weight perpendicular to the surface", "The ramp has to hold up the weight plus stop it sliding", "Newton’s third law makes them equal and opposite"]}, {"q": "A satellite moves in a perfectly circular orbit. How much work does the gravitational force do on it over one full orbit?", "a": ["A large positive amount", "A large negative amount", "Zero", "It depends on the orbital radius"], "r": ["The force is always perpendicular to the motion, so it does no work", "Gravity is pulling it constantly so it must be doing work", "It returns to where it started, but the force still did work on the way", "Bigger orbits mean more work done"]}]}, "p10": {"title": "Part 10 — Answering the question asked", "intro": ["Here is one situation. Answer it five times, once for each instruction. Same physics each time — what changes is what I’m asking you for.", "Notice how much you write for each one."], "situation": "A parachutist jumps from a stationary helicopter. She falls freely for several seconds before opening her parachute. She eventually descends at a constant speed.", "items": ["State the forces acting on the parachutist after the parachute has opened.", "Outline why she reaches a constant speed.", "Explain why her acceleration decreases as her speed increases.", "Deduce what happens to her speed in the moments immediately after the parachute opens.", "Discuss how her motion would differ if she had jumped on the Moon, where there is no atmosphere."]}, "pr": {"title": "Part R — On paper", "intro": ["This last bit isn’t in the form. Do it on plain paper and photograph it.", "For each situation below: draw the situation, draw a free-body diagram for the object named, and mark which direction you’re calling positive.", "There are no numbers, and there’s nothing to calculate. Just the drawings."], "items": ["R1 — A block sliding down a rough ramp. Free-body diagram for the block.", "R2 — A ball at three moments: on the way up, at the top, on the way down, after being thrown vertically. A free-body diagram for each of the three.", "R3 — A car at the top of a humpback bridge. Free-body diagram for the car.", "R4 — Two trolleys, the instant they collide. A free-body diagram for each trolley."]}};</script><script>
'use strict';
const C = CONTENT;
const KEY = 'mbphys_s' + C.sitting + '_v1';
const W3KEY = 'REPLACE_WITH_WEB3FORMS_KEY';

function load(){ try{ const s = localStorage.getItem(KEY); return s ? JSON.parse(s) : null; }catch(e){ return null; } }
let state = load() || { name:'', startedAt:new Date().toISOString(), totalSec:0, cur:0, a:{}, d:{} };
if(!state.d) state.d = {};
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function clean(t){
  const v = String(t==null?'':t).replace(/\|/g,'/').replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').trim();
  return v === '' ? 'BLANK' : v;
}
const LET = 'ABCDEF';

// ---- screens
function buildScreens(){
  const s = [];
  s.push({k:'intro'});
  if(C.sitting === 1){
    s.push({k:'p1'});
    s.push({k:'card', part:'p2'});
    C.p2.items.forEach((q,i)=>s.push({k:'p2', i:i}));
    s.push({k:'p3'});
    s.push({k:'card', part:'p4'});
    C.p4.items.forEach((q,i)=>s.push({k:'p4', i:i}));
    s.push({k:'p5'});
  } else {
    s.push({k:'card', part:'p6'});
    C.p6.items.forEach((q,i)=>s.push({k:'p6', i:i}));
    s.push({k:'p7a'});
    s.push({k:'p7b'});
    s.push({k:'p7c'});
    s.push({k:'card', part:'p8'});
    C.p8.items.forEach((q,i)=>s.push({k:'p8', i:i}));
    s.push({k:'card', part:'p9'});
    C.p9.items.forEach((q,i)=>s.push({k:'p9', i:i}));
    s.push({k:'p10'});
    s.push({k:'pr'});
  }
  s.push({k:'gen'});
  return s;
}
const screens = buildScreens();
if(state.cur >= screens.length) state.cur = screens.length - 1;

const app = document.getElementById('app');
const bar = document.getElementById('bar');
let t0 = Date.now();
let timerInt = null;
let p3warned = false;

function elapsed(){ return Math.max(0, Math.round((Date.now() - t0) / 1000)); }

function next(){
  delete state.d[state.cur];
  state.cur++;
  save();
  render();
}
function addTime(sec){ state.totalSec = (state.totalSec || 0) + sec; }

function showErr(msg){
  const e = document.getElementById('err');
  if(e){ e.textContent = msg; e.classList.add('show'); }
}

// ---- draft autosave (restores typed work if the tab is closed)
function bindDraft(){
  const d = state.d[state.cur] || {};
  const els = app.querySelectorAll('input[type=text], textarea, select, input[type=radio]');
  els.forEach(el=>{
    const key = el.name || el.id;
    if(!key) return;
    if(d[key] !== undefined){
      if(el.type === 'radio'){ if(el.value === d[key]){ el.checked = true; el.dispatchEvent(new Event('change')); } }
      else el.value = d[key];
    }
    const ev = (el.tagName === 'SELECT' || el.type === 'radio') ? 'change' : 'input';
    el.addEventListener(ev, function(){
      if(!state.d[state.cur]) state.d[state.cur] = {};
      state.d[state.cur][key] = el.type === 'radio' ? el.value : el.value;
      save();
    });
  });
}

// highlight selected .opt / .conf rows
function bindHighlights(){
  app.querySelectorAll('.opts').forEach(ul=>{
    ul.addEventListener('change', function(){
      ul.querySelectorAll('.opt').forEach(o=>{
        const r = o.querySelector('input'); o.classList.toggle('on', r && r.checked);
      });
    });
    ul.querySelectorAll('.opt input').forEach(r=>{ if(r.checked) r.closest('.opt').classList.add('on'); });
  });
  app.querySelectorAll('.conf').forEach(cw=>{
    cw.addEventListener('change', function(){
      cw.querySelectorAll('label').forEach(l=>{
        const r = l.querySelector('input'); l.classList.toggle('on', r && r.checked);
      });
    });
  });
}

function radioVal(name){
  const r = app.querySelector('input[name="' + name + '"]:checked');
  return r ? r.value : null;
}

function optList(name, options, letters){
  let h = '<ul class="opts">';
  options.forEach((o,i)=>{
    const v = letters ? LET[i] : String(i+1);
    h += '<li><label class="opt"><input type="radio" name="' + name + '" value="' + v + '">' +
         (letters ? '<span class="L">' + LET[i] + '</span>' : '') +
         '<span>' + esc(o) + '</span></label></li>';
  });
  return h + '</ul>';
}

function confRow(name){
  let h = '<span class="fl">How sure are you?</span><div class="conf">';
  [['1','1 · guessing'],['2','2 · fairly sure'],['3','3 · certain']].forEach(p=>{
    h += '<label><input type="radio" name="' + name + '" value="' + p[0] + '">' + p[1] + '</label>';
  });
  return h + '</div>';
}

function nextBtn(label){
  return '<div class="btnrow"><button class="btn" id="next">' + (label || 'Continue') + '</button></div>' +
         '<p class="err" id="err"></p>';
}

// ---------------------------------------------------------------- renderers
const R = {};

R.intro = function(){
  const ps = C.intro.map(p=>'<p class="lede">' + esc(p) + '</p>').join('');
  app.innerHTML =
   '<span class="eyebrow">IB Physics · Higher Level · Sitting ' + C.sitting + '</span>' +
   '<h1>' + esc(C.titleWord) + '.</h1>' + ps +
   '<div class="rule"></div>' +
   '<span class="fl">Your name</span>' +
   '<input type="text" id="sname" autocomplete="name" value="' + esc(state.name) + '">' +
   nextBtn('Begin') +
   (state.cur === 0 && Object.keys(state.a).length ?
     '<p class="b" style="margin-top:26px"><a href="#" id="reset" style="border-bottom:1px solid var(--line)">Start again from the beginning</a></p>' : '');
  document.getElementById('next').onclick = function(){
    const n = document.getElementById('sname').value.trim();
    if(!n){ showErr('Please put your name in first.'); return; }
    state.name = n;
    addTime(elapsed());
    next();
  };
  const rs = document.getElementById('reset');
  if(rs) rs.onclick = function(ev){
    ev.preventDefault();

// ---------------------------------------------------------------- output block
function genBlock(){
  const L = [];
  L.push('=== IBPHYS DIAGNOSTIC v1 ===');
  L.push('STUDENT: ' + (state.name || 'BLANK'));
  L.push('SITTING: ' + C.sitting);
  L.push('DATE: ' + new Date().toISOString().slice(0, 10));
  L.push('TOTAL_ELAPSED_MIN: ' + ((state.totalSec || 0) / 60).toFixed(1));
  L.push('');
  if(C.sitting === 1){
    const p1 = state.a.p1 || {};
    L.push('[P1]');
    for(let i=1; i<=20; i++){
      const id = '1.' + i;
      L.push(id + '=' + (id === '1.19' ? clean(p1[id]) : (p1[id] || 'BLANK')));
    }
    L.push('sec=' + (p1.sec != null ? p1.sec : 'BLANK'));
    L.push('');
    L.push('[P2]');
    for(let i=1; i<=10; i++){
      const id = '2.' + i;
      const r = (state.a.p2 || {})[id] || {};
      L.push(id + '|ans=' + (r.ans || 'BLANK') + '|why=' + clean(r.why) + '|conf=' + (r.conf || 'BLANK') + '|sec=' + (r.sec != null ? r.sec : 'BLANK'));
    }
    L.push('');
    const p3 = state.a.p3 || {g:{}, labels:{}};
    const grp = {A:[], B:[], C:[]};
    for(let i=1; i<=9; i++){ const v = p3.g[i]; if(v) grp[v].push(i); }
    L.push('[P3]');
    L.push('groups=A:[' + grp.A.join(',') + '];B:[' + grp.B.join(',') + '];C:[' + grp.C.join(',') + ']');
    ['A','B','C'].forEach(k=>L.push('label' + k + '=' + clean((p3.labels || {})[k])));
    L.push('sec=' + (p3.sec != null ? p3.sec : 'BLANK'));
    L.push('');
    L.push('[P4]');
    for(let i=1; i<=4; i++){
      const id = '4.' + i;
      const r = (state.a.p4 || {})[id] || {};
      L.push(id + '|s1=' + clean(r.s1) + '|s2=' + clean(r.s2) + '|sec=' + (r.sec != null ? r.sec : 'BLANK'));
    }
    L.push('');
    const p5 = state.a.p5 || {};
    L.push('[P5]');
    L.push('rank=' + ((p5.rank || []).join(', ') || 'BLANK'));
    L.push('5.2=' + clean(p5['5.2']));
    L.push('sec=' + (p5.sec != null ? p5.sec : 'BLANK'));
  } else {
    L.push('[P6]');
    for(let i=1; i<=12; i++){
      const id = '6.' + i;
      const r = (state.a.p6 || {})[id] || {};
      L.push(id + '|ans=' + clean(r.ans) + '|sec=' + (r.sec != null ? r.sec : 'BLANK'));
    }
    L.push('');
    const p7 = state.a.p7 || {};
    L.push('[P7]');
    for(let i=1; i<=3; i++) L.push('7a.' + i + '=' + clean(p7['7a.' + i]));
    L.push('7a.sec=' + (p7.seca != null ? p7.seca : 'BLANK'));
    for(let i=1; i<=3; i++) L.push('7b.' + i + '=' + clean(p7['7b.' + i]));
    L.push('7b.sec=' + (p7.secb != null ? p7.secb : 'BLANK'));
    L.push('7c=ON_PAPER');
    L.push('');
    L.push('[P8]');
    for(let i=1; i<=4; i++){
      const id = '8.' + i;
      const r = (state.a.p8 || {})[id] || {};
      L.push(id + '|line=' + (r.line || 'BLANK') + '|what=' + clean(r.what) + '|conf=' + (r.conf || 'BLANK') + '|sec=' + (r.sec != null ? r.sec : 'BLANK'));
    }
    L.push('');
    L.push('[P9]');
    for(let i=1; i<=8; i++){
      const id = '9.' + i;
      const r = (state.a.p9 || {})[id] || {};
      L.push(id + '|ans=' + (r.ans || 'BLANK') + '|reason=' + (r.reason || 'BLANK') + '|conf=' + (r.conf || 'BLANK') + '|sec=' + (r.sec != null ? r.sec : 'BLANK'));
    }
    L.push('');
    const p10 = state.a.p10 || {};
    L.push('[P10]');
    for(let i=1; i<=5; i++) L.push('10.' + i + '=' + clean(p10['10.' + i]));
    L.push('sec=' + (p10.sec != null ? p10.sec : 'BLANK'));
    L.push('R=ON_PAPER');
  }
  L.push('');
  L.push('=== END ===');
  return L.join('\n');
}

    save();
  };
  document.getElementById('copy').onclick = function(){
    const o = document.getElementById('out');
    o.select();
    let ok = false;
    try{
      if(navigator.clipboard){ navigator.clipboard.writeText(o.value); ok = true; }
      else ok = document.execCommand('copy');
    }catch(e){ try{ ok = document.execCommand('copy'); }catch(e2){} }
    const st = document.getElementById('status');
    st.textContent = ok ? 'Copied. Paste it into a message to me.' : 'Select the block and copy it by hand.';
    st.classList.add('show');
  };
  document.getElementById('send').onclick = function(){
    const btn = this, st = document.getElementById('status');
    const block = document.getElementById('out').value;
    if(!block){ st.textContent = 'Press Generate first.'; st.classList.add('show'); return; }
    btn.disabled = true; btn.textContent = 'Sending…';
    const fd = new FormData();
    fd.append('access_key', W3KEY);
    fd.append('subject', 'Physics HL — Sitting ' + C.sitting + ' results: ' + state.name);
    fd.append('from_name', 'MathBridge site');
    fd.append('student', state.name);
    fd.append('sitting', String(C.sitting));
    fd.append('results', block);
    fetch('https://api.web3forms.com/submit', {method:'POST', body:fd})
      .then(r=>r.json())
      .then(j=>{
        if(j.success){
          st.textContent = 'Sent — it’s on its way to me. Keep the copy above just in case.';
          btn.textContent = 'Sent';
        } else { throw new Error(); }
        st.classList.add('show');
      })
      .catch(function(){
        btn.disabled = false; btn.textContent = 'Send it to me';
        st.textContent = 'That didn’t go through. Copy the block instead and send it to me by email or WhatsApp.';
        st.classList.add('show');
      });
  };
};

// ---------------------------------------------------------------- render loop
function render(){
  if(timerInt){ clearInterval(timerInt); timerInt = null; }
  t0 = Date.now();
  p3warned = false;
  const s = screens[state.cur];
  bar.style.width = (state.cur / (screens.length - 1) * 100) + '%';
  R[s.k](s);
  bindHighlights();
  bindDraft();
  window.scrollTo(0, 0);
}
render();
</script></body></html>
